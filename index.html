<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muffin Card</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="card-container">
    <div class="card">
    <img src="muffin.png" alt="Muffin Image" class="card-img">
    <div class="card-body">
        <h3 class="card-title">Delicious Muffin</h3>
        <p class="card-text" >A delicious and moist muffin that will satisfy your sweet tooth. </p>
        <div class="card-btn">
            <a href="#" class="btn">Add to Cart</a>
        </div>
    </div>
</div>
<div class="card">
    <img src="flan.png" alt="Flan Image" class="card-img">
    <div class="card-body">
        <h3 class="card-title">Delicious Flan</h3>
        <p class="card-text" >A delicious and creamy flan that will satisfy your sweet tooth. </p>
        <div class="card-btn">
            <a href="#" class="btn">Add to Cart</a>
        </div>
    </div>
</div>
<div class="card">
    <img src="maccaron.png" alt="Maccaron Image" class="card-img">
    <div class="card-body">
        <h3 class="card-title">Delicious Maccaron</h3>
        <p class="card-text" >A delicious and colorful maccaron that will satisfy your sweet tooth. </p>
        <div class="card-btn">
            <a href="#" class="btn">Add to Cart</a>
        </div>
    </div>
</div>
</div>
    
</body>
</html>
